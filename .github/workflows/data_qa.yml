name: Data QA Runner

on:
  push:
    paths:
      - 'data/**' # Runs automatically whenever data files change

jobs:
  run-ai-qa:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pyod scikit-learn

    - name: Run AI Data Analyzer
      run: python src/analyzer.py

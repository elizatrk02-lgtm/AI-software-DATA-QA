name: Data QA Runner

on:
  push:
    paths:
      - 'data/**'
  pull_request:
    paths:
      - 'data/**'

permissions:
  contents: write

jobs:
  run-ai-qa:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pyod scikit-learn openpyxl

    - name: Run AI Data Analyzer
      run: python src/analyzer.py

    - name: Deploy Dashboard
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public

    - name: Send Email Notification on Failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ://gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "⚠️ CRITICAL: AI Data QA Failure Detected"
        to: ${{ secrets.NOTIFY_EMAIL }}
        from: AI Data QA System
        body: The data file uploaded to your repository contains severe AI anomalies or data errors and has been blocked. Check the visual report on GitHub Pages.
